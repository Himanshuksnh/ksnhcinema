<!DOCTYPE html>
<html>
<head>
  <title>DASH Test</title>
  <script src="https://cdn.jsdelivr.net/npm/dashjs@4.7.1/dist/dash.all.min.js"></script>
</head>
<body>
  <h2>DASH H.265 Browser Test</h2>
  <video id="v" controls width="800" height="450" style="background:#000"></video>
  <div id="log" style="font-family:monospace;margin-top:10px;white-space:pre"></div>
  <script>
    const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; console.log(msg); };
    
    // Check H.265 support
    const v = document.createElement('video');
    const h265Support = v.canPlayType('video/mp4; codecs="hvc1"') || v.canPlayType('video/mp4; codecs="hev1"');
    log('H.265 browser support: ' + (h265Support || 'NO'));
    log('dash.js version: ' + dashjs.Version);
    
    // Test with proxy URL (cookie will be missing but we can see if DASH loads)
    const mpdUrl = '/cdn-proxy?url=' + encodeURIComponent('https://sacdn.hakunaymatata.com/dash/3476269390159565984_0_0_1080_h265_/index.mpd');
    log('Loading: ' + mpdUrl.substring(0, 80));
    
    const player = dashjs.MediaPlayer().create();
    
    player.extend('RequestModifier', function() {
      return {
        modifyRequest: function(request) {
          if (request.url && !request.url.startsWith('/cdn-proxy') && !request.url.startsWith('http://localhost')) {
            request.url = '/cdn-proxy?url=' + encodeURIComponent(request.url);
          }
          return request;
        }
      };
    }, true);
    
    player.on(dashjs.MediaPlayer.events.ERROR, (e) => log('ERROR: ' + JSON.stringify(e.error)));
    player.on(dashjs.MediaPlayer.events.MANIFEST_LOADED, () => log('✅ Manifest loaded!'));
    player.on(dashjs.MediaPlayer.events.CAN_PLAY, () => log('✅ Can play!'));
    player.on(dashjs.MediaPlayer.events.PLAYBACK_STARTED, () => log('✅ Playback started!'));
    
    player.initialize(document.getElementById('v'), mpdUrl, true);
  </script>
</body>
</html>
