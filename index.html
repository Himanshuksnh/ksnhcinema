<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSNH Movies</title>
  <meta http-equiv="refresh" content="0; url=https://aniplix-app.web.app/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #e50914;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e50914; }
    p { font-size: 0.95rem; color: #aaa; }
    a { color: #e50914; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>KSNH Movies</h1>
    <p>Redirecting you... <a href="https://aniplix-app.web.app/">Click here</a> if not redirected.</p>
  </div>
  <script>
    window.location.replace("https://aniplix-app.web.app/");
  </script>
</body>
</html>
