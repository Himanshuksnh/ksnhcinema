<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSNH Movies | Stream & Download</title>
  <meta name="description" content="Stream and download premium movies, web series, and anime in HD." />
  <meta http-equiv="refresh" content="4; url=https://aniplix-app.web.app/" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060606;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated gradient background */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 60%),
                  radial-gradient(ellipse at 60% 80%, #1a0808 0%, transparent 60%),
                  #060606;
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(229, 9, 20, 0.15);
      animation: float linear infinite;
    }
    .particle:nth-child(1)  { width: 6px;  height: 6px;  left: 10%; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2)  { width: 4px;  height: 4px;  left: 25%; animation-duration: 18s; animation-delay: 2s; }
    .particle:nth-child(3)  { width: 8px;  height: 8px;  left: 40%; animation-duration: 14s; animation-delay: 4s; background: rgba(100, 60, 255, 0.15); }
    .particle:nth-child(4)  { width: 3px;  height: 3px;  left: 60%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5)  { width: 5px;  height: 5px;  left: 75%; animation-duration: 16s; animation-delay: 3s; }
    .particle:nth-child(6)  { width: 7px;  height: 7px;  left: 88%; animation-duration: 11s; animation-delay: 5s; background: rgba(100, 60, 255, 0.15); }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 40px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      max-width: 480px;
      width: 90%;
      box-shadow: 0 0 80px rgba(229, 9, 20, 0.08), 0 32px 64px rgba(0,0,0,0.5);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo / Icon */
    .logo-wrap {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .logo-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, #e50914, #7c3aed) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: rotatering 3s linear infinite;
    }
    @keyframes rotatering {
      to { transform: rotate(360deg); }
    }
    .logo-inner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e50914 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
    }

    /* Text */
    .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, #aaa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      text-align: center;
    }
    .title span {
      background: linear-gradient(135deg, #e50914, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.6;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e50914, #7c3aed);
      border-radius: 99px;
      animation: fill 4s linear forwards;
      box-shadow: 0 0 8px rgba(229, 9, 20, 0.6);
    }
    @keyframes fill {
      to { width: 100%; }
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #e50914 0%, #b80710 100%);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(229, 9, 20, 0.35);
      letter-spacing: 0.3px;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 32px rgba(229, 9, 20, 0.5);
    }
    .btn svg {
      width: 16px; height: 16px;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 10px;
      border-radius: 99px;
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="card">

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-inner">🎬</div>
    </div>

    <div>
      <div class="title">KSNH <span>Movies</span></div>
    </div>

    <div class="tags">
      <span class="tag">Movies</span>
      <span class="tag">Web Series</span>
      <span class="tag">Anime</span>
      <span class="tag">HD</span>
    </div>

    <p class="subtitle">
      Stream &amp; download premium content.<br/>Redirecting you to the app...
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Redirecting</span>
        <span id="countdown">4s</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <a class="btn" href="https://aniplix-app.web.app/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      Open App Now
    </a>

  </div>

  <script>
    // Countdown
    let t = 4;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      t--;
      el.textContent = t + 's';
      if (t <= 0) {
        clearInterval(timer);
        window.location.replace('https://aniplix-app.web.app/');
      }
    }, 1000);
  </script>

</body>
</html>
